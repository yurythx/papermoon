[mypy]
python_version = 3.12
cache_dir = /tmp/mypy_cache
plugins =
    mypy_django_plugin.main,
    mypy_drf_plugin.main

# Django plugin settings
[mypy.plugins.django-stubs]
django_settings_module = core.settings.local

# Global options
strict = false
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = false
disallow_untyped_defs = true
disallow_incomplete_defs = true

# Third-party apps without stubs
[mypy-celery.*]
ignore_missing_imports = true

[mypy-environ.*]
ignore_missing_imports = true

[mypy-sentry_sdk.*]
ignore_missing_imports = true

[mypy-factory.*]
ignore_missing_imports = true

[mypy-drf_spectacular.*]
ignore_missing_imports = true

[mypy-django_celery_beat.*]
ignore_missing_imports = true

# Migrations are auto-generated — don't check them
[mypy-*.migrations.*]
ignore_errors = true

# Tests have looser typing requirements
[mypy-tests.*]
ignore_errors = true

# Settings use dynamic dict manipulation that mypy can't model
[mypy-core.settings.*]
ignore_errors = true

# Pre-existing type issues in these modules — tracked separately, not blocking commits
[mypy-apps.licensing.tasks]
ignore_errors = true

[mypy-apps.licensing.handlers]
ignore_errors = true

[mypy-apps.licensing.admin]
ignore_errors = true

[mypy-apps.licensing.views]
ignore_errors = true

[mypy-apps.licensing.queries]
ignore_errors = true

[mypy-apps.licensing.commands]
ignore_errors = true

[mypy-apps.audit.*]
ignore_errors = true

[mypy-apps.subscriptions.tasks]
ignore_errors = true

[mypy-apps.accounts.admin]
ignore_errors = true

[mypy-apps.accounts.views]
ignore_errors = true

[mypy-apps.billing.queries]
ignore_errors = true

[mypy-apps.billing.views]
ignore_errors = true

[mypy-shared.renderers]
ignore_errors = true

[mypy-shared.views]
ignore_errors = true

[mypy-apps.customers.commands]
ignore_errors = true

[mypy-apps.customers.views_client]
ignore_errors = true

[mypy-apps.customers.views_admin]
ignore_errors = true

[mypy-apps.subscriptions.views_service_access]
ignore_errors = true

[mypy-apps.subscriptions.views_client]
ignore_errors = true

[mypy-apps.subscriptions.views_admin]
ignore_errors = true

[mypy-apps.provisioning.handlers]
ignore_errors = true

