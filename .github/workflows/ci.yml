name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: core.settings.local

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install ruff==0.5.7

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  # ── Type check ───────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run mypy
        env:
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///tmp/mypy.db
          REDIS_URL: redis://localhost:6379/0
        run: mypy . --config-file mypy.ini

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: papermoon_test
          POSTGRES_USER: papermoon
          POSTGRES_PASSWORD: papermoon
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgres://papermoon:papermoon@localhost:5432/papermoon_test
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ASAAS_API_KEY: ""
      ASAAS_WEBHOOK_TOKEN: ci-webhook-token
      CHATWOOT_API_URL: ""
      CHATWOOT_API_KEY: ""
      SENTRY_DSN: ""
      # JWT_PRIVATE_KEY / JWT_PUBLIC_KEY não definidos aqui intencionalmente:
      # core.settings.local detecta a ausência e gera um par RSA-2048 efêmero
      # em .jwt_dev_keys.json dentro do workspace do runner (descartado após o job).

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Django system check
        run: python manage.py check

      - name: Run tests with coverage
        run: pytest tests/ -q --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm test

      - name: Type check + build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ── E2E (Playwright) ─────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: papermoon_test
          POSTGRES_USER: papermoon
          POSTGRES_PASSWORD: papermoon
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgres://papermoon:papermoon@localhost:5432/papermoon_test
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ASAAS_API_KEY: ""
      ASAAS_WEBHOOK_TOKEN: ci-webhook-token
      CHATWOOT_API_URL: ""
      CHATWOOT_API_KEY: ""
      SENTRY_DSN: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      DJANGO_INTERNAL_URL: http://localhost:8000/api/v1
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      # ── Python / backend ──────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Migrate + seed data
        working-directory: backend
        run: |
          python manage.py migrate --no-input
          python manage.py seed

      - name: Start Django (background)
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          echo "Waiting for Django..." && sleep 5

      # ── Node / frontend ───────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start Next.js (background)
        working-directory: frontend
        run: |
          npm run start &
          echo "Waiting for Next.js..." && sleep 10

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Security audit ───────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-93

  # ── Docker build ─────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, frontend, e2e, security]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: papermoon-backend:${{ github.sha }}
